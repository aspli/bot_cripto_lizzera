version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cryptobot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cryptobot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/cryptobot
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
